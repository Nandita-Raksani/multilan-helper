<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <!-- View Mode Banner (shown for non-editors) -->
    <div id="viewModeBanner" class="view-mode-banner" style="display: none;">
      Preview Mode - Browse translations and copy text (editing requires full seat)
    </div>

    <!-- Folder Selector -->
    <div id="folderSelectorSection" class="folder-selector-section" style="display: none;">
      <div id="folderBar" class="folder-bar"></div>
    </div>

    <!-- Language Bar -->
    <div id="languageBarSection" class="lang-bar-section">
      <p class="lang-bar-hint">Change language of selection or entire page</p>
      <div class="lang-bar">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="highlight-btn" id="highlightUnlinkedBtn" title="Select a layer to highlight">Highlight<br>unlinked</button>
      </div>
    </div>

    <!-- Search Panel -->
    <div id="searchPanel" class="panel active">
      <div class="search-container">
        <textarea class="search-panel-input" id="globalSearchInput" placeholder="Search by ID or text..." rows="1"></textarea>
      </div>
      <div class="search-hint" style="display:none"></div>
      <div id="globalSearchResultsCount" class="search-results-count"></div>
      <div id="globalSearchResults"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="statusText">Ready</span>
      <div class="status-bar-right">
        <span id="buildTimestamp"></span>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
